version: "1.0"
stages:
steps:
  main_clone:
    type: git-clone
    git: rosetta-models
    repo: "${{CF_REPO_OWNER}}/${{CF_REPO_NAME}}"
    revision: "${{CF_REVISION}}"

  IsTriggeredByGitHubRelease:
    image: alpine
    commands:
      - if [[ '${{CF_RELEASE_TAG}}' == *'CF_RELEASE_TAG'* ]]; then cf_export IS_RELEASE=false; else cf_export IS_RELEASE=true; fi

  BuildProperties:
    image: alpine
    commands:
      - echo "${{ARTIFACT_REGISTRY_SA_KEY}}"|base64 -d>"${{CF_VOLUME_PATH}}"/sa
      - cf_export GOOGLE_APPLICATION_CREDENTIALS="${{CF_VOLUME_PATH}}"/sa

  ReleaseNameForTag:
    image: alpine/git
    when:
      condition:
        all:
          releaseNameNotDefined: "${{IS_RELEASE}} == true"
    commands:
      - cf_export MVN_BUILD_CMD="clean deploy"
      - cf_export RELEASE_NAME=${{CF_RELEASE_TAG}}

  ReleaseNameForBranch:
    image: alpine/git
    when:
      condition:
        all:
          releaseNameNotDefined: "${{IS_RELEASE}} == false"
    commands:
      - cf_export MVN_BUILD_CMD="clean deploy -U"
      - export SNAPSHOT_VERSION=${{GLOBAL_RELEASE_VERSION}}.${{CF_BRANCH_TAG_NORMALIZED}}-SNAPSHOT
      - cf_export RELEASE_NAME=$SNAPSHOT_VERSION

  Build:
    image: maven:3.9.11-eclipse-temurin-21-alpine
    working_directory: ./
    commands:
      - cf_export MVN_SET_VERSION="versions:set -DnewVersion=${{RELEASE_NAME}}"
      - mvn ${{MVN_BUILD_CMD}}
